server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable server tokens
    server_tokens off;

    # gzip for text payloads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Long-term cache for hashed Astro assets
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Pagefind search index — short cache so updates propagate
    location /pagefind/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static media
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # HTML and everything else: try clean URLs (Astro outputs /slug/index.html)
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # 404 page generated by Starlight
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
