services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-engineer-docs:latest
    container_name: agent-engineer-docs
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
